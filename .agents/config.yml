# Bearings — agent configuration
library_path: /Users/alexweinstein/Documents/code/skyfly/app-dev-agents
output_dir: assembled
orchestrator: true

feature_agents:

  po:
    enabled: true
    modules:
      evaluation:
        enabled: true

  architect:
    enabled: true
    modules:
      design-accuracy:
        enabled: true
        dimensions: [architectural]
      evaluation:
        enabled: true

  qa:
    enabled: true
    modules:
      evaluation:
        enabled: true

  test:
    enabled: true
    modules:
      evaluation:
        enabled: true

  backend:
    enabled: false   # no backend — API proxy is a single thin route, not a service layer

  frontend:
    enabled: true
    stacks:
      - ssr
    modules:
      security:
        enabled: true
      accessibility:
        enabled: true
      performance:
        enabled: true
      design-accuracy:
        enabled: true
        dimensions: [architectural]   # no visual — no Figma/mockups
      evaluation:
        enabled: true

  devops:
    enabled: false

review_agents:
  security: true
  code-quality: true
  accessibility: true
  architectural-consistency: true
  cicd: false              # no IaC in repo
  document-consistency: false   # no .spec/ artifacts yet
  po-signoff: true

project:
  prototype: false

context:
  task_sizes:
    typical: medium
    split_threshold: large

settings:
  auto_fix_permitted: false
  wcag_target: AA
  default_design_accuracy_dimensions: [architectural]
