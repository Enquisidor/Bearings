    content: |
      No traditional auth (passwords, OAuth, account recovery). A lightweight magic link
      or passphrase for cloud sync access (Step 4) is acceptable. No database, no analytics.
      The only server-side storage is Cloudflare R2 encrypted blobs. One thin server role.

  - type: project_rule
